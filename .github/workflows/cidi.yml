name: CICD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  compile:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn compile


  security-check:
    runs-on: self-hosted
    needs: compile   # 👈 pehle compile job run hogi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      

      - name: Trivy FS Scan
        run: trivy fs --format table -o fs-report.json .

      

     
      - name: Gitleaks Code Scan
        run: gitleaks detect --source . -r gitleaks-report.json -f json
